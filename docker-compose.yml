services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ironfist
      POSTGRES_USER:     ironfist_admin
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironfist_admin -d ironfist"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT:          dev
      DEBUG:                "true"
      LOG_LEVEL:            INFO
      DB_HOST:              db
      DB_PORT:              "5432"
      DB_NAME:              ironfist
      DB_USERNAME:          ironfist_admin
      DB_PASSWORD:          devpassword
      AUTH_MODE:            local
      JWT_SECRET:           dev-secret-change-in-production
      LOCAL_AUTH_USERNAME:  admin
      LOCAL_AUTH_PASSWORD:  ironfist
      OPENAI_API_KEY:       ${OPENAI_API_KEY:-}
      NVD_API_KEY:          ${NVD_API_KEY:-}
      CMDB_AGENT_TOKEN:     dev-agent-token
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ───────────────────────────────────────────────────────────
  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules    # Prevents local node_modules from overwriting container's
    depends_on:
      - api

volumes:
  postgres_data:
